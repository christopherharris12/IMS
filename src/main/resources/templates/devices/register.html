<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register Device</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #0f4c81 0%, #1b7cc9 100%); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-laptop"></i> IMS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/devices"><i class="bi bi-hdd-rack"></i> Devices</a></li>
                    <li class="nav-item"><a class="nav-link" href="/assignments"><i class="bi bi-person-check"></i> Assignments</a></li>
                    <li class="nav-item"><a class="nav-link" href="/issues"><i class="bi bi-exclamation-triangle"></i> Issues</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports"><i class="bi bi-graph-up"></i> Reports</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-5">
        <div class="row mb-4">
            <div class="col-12">
                <h1><i class="bi bi-plus-circle"></i> Register New Device</h1>
                <p class="text-muted">Add a new device to the inventory system</p>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/devices/register}" method="post" th:object="${device}">
                            <div class="mb-3">
                                <label for="assetTag" class="form-label">Asset Tag <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="assetTag" th:field="*{assetTag}" placeholder="e.g., ASSET-001" required>
                            </div>

                            <div class="mb-3">
                                <label for="deviceType" class="form-label">Device Type <span class="text-danger">*</span></label>
                                <select class="form-select" id="deviceType" th:field="*{deviceType}" required>
                                    <option value="">Select Device Type</option>
                                    <option value="LAPTOP">Laptop</option>
                                    <option value="DESKTOP">Desktop</option>
                                    <option value="MOBILE_PHONE">Mobile Phone</option>
                                </select>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="manufacturer" class="form-label">Manufacturer <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="manufacturer" th:field="*{manufacturer}" placeholder="e.g., Dell, HP, Apple" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="model" class="form-label">Model <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="model" th:field="*{model}" placeholder="e.g., Latitude 5440" required>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="serialNumber" class="form-label">Serial Number <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="serialNumber" th:field="*{serialNumber}" placeholder="Unique serial number" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="condition" class="form-label">Condition</label>
                                        <select class="form-select" id="condition" th:field="*{condition}">
                                            <option value="NEW">New</option>
                                            <option value="GOOD">Good</option>
                                            <option value="FAIR">Fair</option>
                                            <option value="POOR">Poor</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="specifications" class="form-label">Specifications</label>
                                <textarea class="form-control" id="specifications" th:field="*{specifications}" rows="4" placeholder="e.g., RAM, CPU, Storage details..."></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="notes" class="form-label">Notes</label>
                                <textarea class="form-control" id="notes" th:field="*{notes}" rows="3" placeholder="Additional notes..."></textarea>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Register Device</button>
                                <a href="/devices" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light py-4 mt-5 border-top">
        <div class="container-fluid text-center">
            <p class="text-muted mb-0"><i class="bi bi-shield-check"></i> IMS v1.0.0</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div th:if="${session.currentUser != null}" style="position: fixed; right: 16px; bottom: 16px; z-index: 1040; display: flex; gap: 8px; align-items: center; background: #ffffff; border: 1px solid #d0dff0; border-radius: 999px; padding: 6px 10px; box-shadow: 0 6px 18px rgba(16,50,84,0.18);">
    <span style="font-size: 12px; color: #4d627c;" th:text="'User: ' + ${session.currentUser.username}">Admin</span>
    <a href="/logout" class="btn btn-sm btn-outline-danger" style="border-radius: 999px;">Logout</a>
</div>
</body>
</html>
