<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Issues Report</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #0f4c81 0%, #1b7cc9 100%);"><div class="container-fluid"><a class="navbar-brand" href="/">IMS</a></div></nav>
    <div class="container py-5"><a href="/reports" class="btn btn-secondary btn-sm mb-3">Back</a><h1>Issues Report</h1>
        <div class="row mt-4">
            <div class="col-md-3"><div class="card"><div class="card-body"><p class="text-muted">Total</p><h3 th:text="${totalIssues}">0</h3></div></div></div>
            <div class="col-md-3"><div class="card"><div class="card-body"><p class="text-muted">Open</p><h3 th:text="${openIssues}">0</h3></div></div></div>
            <div class="col-md-3"><div class="card"><div class="card-body"><p class="text-muted">Resolved</p><h3 th:text="${resolvedIssues}">0</h3></div></div></div>
        </div>
        <div class="card mt-4"><div class="card-body"><table class="table"><thead><tr><th>Device</th><th>Type</th><th>Severity</th><th>Status</th></tr></thead><tbody>
            <tr th:each="issue : ${issues}"><td th:text="${issue.device.assetTag}">-</td><td th:text="${issue.issueType}">-</td><td th:text="${issue.severity}">-</td><td th:text="${issue.status}">-</td></tr>
        </tbody></table></div></div>
    </div>
<div th:if="${session.currentUser != null}" style="position: fixed; right: 16px; bottom: 16px; z-index: 1040; display: flex; gap: 8px; align-items: center; background: #ffffff; border: 1px solid #d0dff0; border-radius: 999px; padding: 6px 10px; box-shadow: 0 6px 18px rgba(16,50,84,0.18);">
    <span style="font-size: 12px; color: #4d627c;" th:text="'User: ' + ${session.currentUser.username}">Admin</span>
    <a href="/logout" class="btn btn-sm btn-outline-danger" style="border-radius: 999px;">Logout</a>
</div>
</body></html>
