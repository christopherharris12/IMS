<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Audit Trail</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #0f4c81 0%, #1b7cc9 100%);"><div class="container-fluid"><a class="navbar-brand" href="/">IMS</a></div></nav>
    <div class="container py-5"><a href="/reports" class="btn btn-secondary btn-sm mb-3">Back</a><h1>Audit Trail Report</h1>
        <div class="card mt-4"><div class="card-body"><table class="table table-sm"><thead><tr><th>Device</th><th>Action</th><th>Old Value</th><th>New Value</th><th>Date</th><th>By</th></tr></thead><tbody>
            <tr th:each="log : ${auditLogs}"><td th:text="${log.device.assetTag}">-</td><td th:text="${log.action}">-</td><td th:text="${log.previousValue}">-</td><td th:text="${log.newValue}">-</td><td th:text="${#temporals.format(log.actionDate, 'dd MMM HH:mm')}">-</td><td th:text="${log.performedBy}">-</td></tr>
        </tbody></table></div></div>
    </div>
<div th:if="${session.currentUser != null}" style="position: fixed; right: 16px; bottom: 16px; z-index: 1040; display: flex; gap: 8px; align-items: center; background: #ffffff; border: 1px solid #d0dff0; border-radius: 999px; padding: 6px 10px; box-shadow: 0 6px 18px rgba(16,50,84,0.18);">
    <span style="font-size: 12px; color: #4d627c;" th:text="'User: ' + ${session.currentUser.username}">Admin</span>
    <a href="/logout" class="btn btn-sm btn-outline-danger" style="border-radius: 999px;">Logout</a>
</div>
</body></html>
