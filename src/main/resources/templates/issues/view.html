<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Issue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #0f4c81 0%, #1b7cc9 100%);">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-laptop"></i> IMS</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            <div class="col-md-8">
                <a href="/issues" class="btn btn-secondary btn-sm mb-3"><i class="bi bi-arrow-left"></i> Back</a>
                <h1><i class="bi bi-exclamation-triangle"></i> Issue Details</h1>
                
                <div class="card mt-3">
                    <div class="card-body">
                        <p><strong>Device:</strong> <span th:text="${issue.device.assetTag}">ASSET-001</span></p>
                        <p><strong>Issue Type:</strong> <span th:text="${issue.issueType}">HARDWARE_ISSUE</span></p>
                        <p><strong>Severity:</strong> <span class="badge bg-danger" th:text="${issue.severity}">CRITICAL</span></p>
                        <p><strong>Status:</strong> <span th:text="${issue.status}">OPEN</span></p>
                        <p><strong>Reported:</strong> <span th:text="${#temporals.format(issue.reportedDate, 'dd MMM yyyy HH:mm')}">01 Jan</span></p>
                        <p><strong>Reported By:</strong> <span th:text="${issue.reportedBy}">Admin</span></p>
                        <hr>
                        <p><strong>Description:</strong></p>
                        <p th:text="${issue.description}">Issue description</p>
                        <div th:if="${issue.resolution}">
                            <hr>
                            <p><strong>Resolution:</strong></p>
                            <p th:text="${issue.resolution}">Resolution details</p>
                        </div>
                    </div>
                </div>
                
                <div th:if="${issue.status == 'OPEN'}" class="mt-3">
                    <a th:href="'/issues/' + ${issue.id} + '/resolve'" class="btn btn-success"><i class="bi bi-check-circle"></i> Resolve Issue</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div th:if="${session.currentUser != null}" style="position: fixed; right: 16px; bottom: 16px; z-index: 1040; display: flex; gap: 8px; align-items: center; background: #ffffff; border: 1px solid #d0dff0; border-radius: 999px; padding: 6px 10px; box-shadow: 0 6px 18px rgba(16,50,84,0.18);">
    <span style="font-size: 12px; color: #4d627c;" th:text="'User: ' + ${session.currentUser.username}">Admin</span>
    <a href="/logout" class="btn btn-sm btn-outline-danger" style="border-radius: 999px;">Logout</a>
</div>
</body>
</html>
