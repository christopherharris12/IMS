<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Report Issue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #0f4c81 0%, #1b7cc9 100%);">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-laptop"></i> IMS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/devices"><i class="bi bi-hdd-rack"></i> Devices</a></li>
                    <li class="nav-item"><a class="nav-link" href="/assignments"><i class="bi bi-person-check"></i> Assignments</a></li>
                    <li class="nav-item"><a class="nav-link" href="/issues"><i class="bi bi-exclamation-triangle"></i> Issues</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports"><i class="bi bi-graph-up"></i> Reports</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-5">
        <div class="row mb-4">
            <div class="col-12">
                <h1><i class="bi bi-exclamation-lg"></i> Report New Issue</h1>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card">
                    <div class="card-body">
                        <form action="/issues/report" method="post">
                            <div class="mb-3">
                                <label for="deviceId" class="form-label">Device <span class="text-danger">*</span></label>
                                <select class="form-select" id="deviceId" name="deviceId" required>
                                    <option value="">Select Device</option>
                                    <option th:each="device : ${devices}" th:value="${device.id}" th:text="${device.assetTag} + ' - ' + ${device.deviceType}">
                                        ASSET-001 - LAPTOP
                                    </option>
                                </select>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="issueType" class="form-label">Issue Type <span class="text-danger">*</span></label>
                                        <select class="form-select" id="issueType" name="issueType" required>
                                            <option value="">Select Type</option>
                                            <option value="HARDWARE_ISSUE">Hardware Issue</option>
                                            <option value="SOFTWARE_ISSUE">Software Issue</option>
                                            <option value="DAMAGE">Damage</option>
                                            <option value="LOST">Lost</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="severity" class="form-label">Severity <span class="text-danger">*</span></label>
                                        <select class="form-select" id="severity" name="severity" required>
                                            <option value="">Select Severity</option>
                                            <option value="LOW">Low</option>
                                            <option value="MEDIUM">Medium</option>
                                            <option value="HIGH">High</option>
                                            <option value="CRITICAL">Critical</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="description" name="description" rows="4" placeholder="Describe the issue in detail..." required></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="reportedBy" class="form-label">Reported By <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="reportedBy" name="reportedBy" placeholder="Your name or ID" required>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-danger"><i class="bi bi-exclamation-circle"></i> Report Issue</button>
                                <a href="/issues" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light py-4 mt-5 border-top">
        <div class="container-fluid text-center">
            <p class="text-muted mb-0"><i class="bi bi-shield-check"></i> IMS v1.0.0</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div th:if="${session.currentUser != null}" style="position: fixed; right: 16px; bottom: 16px; z-index: 1040; display: flex; gap: 8px; align-items: center; background: #ffffff; border: 1px solid #d0dff0; border-radius: 999px; padding: 6px 10px; box-shadow: 0 6px 18px rgba(16,50,84,0.18);">
    <span style="font-size: 12px; color: #4d627c;" th:text="'User: ' + ${session.currentUser.username}">Admin</span>
    <a href="/logout" class="btn btn-sm btn-outline-danger" style="border-radius: 999px;">Logout</a>
</div>
</body>
</html>
