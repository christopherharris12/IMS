<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Assignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #0f4c81 0%, #1b7cc9 100%);">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-laptop"></i> IMS</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            <div class="col-md-8">
                <h2>Assignment Details</h2>
                <div class="card mt-3">
                    <div class="card-body">
                        <p><strong>Device:</strong> <span th:text="${assignment.device.assetTag}">ASSET-001</span></p>
                        <p><strong>Employee:</strong> <span th:text="${assignment.employeeName}">John</span></p>
                        <p><strong>Department:</strong> <span th:text="${assignment.department}">IT</span></p>
                        <p><strong>Status:</strong> <span th:text="${assignment.status}">ACTIVE</span></p>
                        <p><strong>Assigned Date:</strong> <span th:text="${#temporals.format(assignment.assignedDate, 'dd MMM yyyy')}">01 Jan</span></p>
                    </div>
                </div>
                <a th:href="'/assignments/' + ${assignment.id} + '/return'" class="btn btn-warning mt-3"><i class="bi bi-arrow-return-left"></i> Return Device</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div th:if="${session.currentUser != null}" style="position: fixed; right: 16px; bottom: 16px; z-index: 1040; display: flex; gap: 8px; align-items: center; background: #ffffff; border: 1px solid #d0dff0; border-radius: 999px; padding: 6px 10px; box-shadow: 0 6px 18px rgba(16,50,84,0.18);">
    <span style="font-size: 12px; color: #4d627c;" th:text="'User: ' + ${session.currentUser.username}">Admin</span>
    <a href="/logout" class="btn btn-sm btn-outline-danger" style="border-radius: 999px;">Logout</a>
</div>
</body>
</html>
