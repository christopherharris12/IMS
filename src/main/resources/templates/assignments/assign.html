<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Assign Device</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #0f4c81 0%, #1b7cc9 100%);">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-laptop"></i> IMS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/devices"><i class="bi bi-hdd-rack"></i> Devices</a></li>
                    <li class="nav-item"><a class="nav-link" href="/assignments"><i class="bi bi-person-check"></i> Assignments</a></li>
                    <li class="nav-item"><a class="nav-link" href="/issues"><i class="bi bi-exclamation-triangle"></i> Issues</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports"><i class="bi bi-graph-up"></i> Reports</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-5">
        <div class="row mb-4">
            <div class="col-12">
                <h1><i class="bi bi-person-plus"></i> Assign Device to Employee</h1>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card">
                    <div class="card-body">
                        <form action="/assignments/assign" method="post">
                            <div class="mb-3">
                                <label for="deviceId" class="form-label">Device <span class="text-danger">*</span></label>
                                <select class="form-select" id="deviceId" name="deviceId" required>
                                    <option value="">Select Available Device</option>
                                    <option th:each="device : ${availableDevices}" th:value="${device.id}" th:text="${device.assetTag} + ' - ' + ${device.deviceType} + ' (' + ${device.manufacturer} + ' ' + ${device.model} + ')'">
                                        ASSET-001 - LAPTOP
                                    </option>
                                </select>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="employeeId" class="form-label">Employee ID <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="employeeId" name="employeeId" placeholder="e.g., EMP001" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="employeeName" class="form-label">Employee Name <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="employeeName" name="employeeName" placeholder="e.g., John Doe" required>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="department" class="form-label">Department <span class="text-danger">*</span></label>
                                <select class="form-select" id="department" name="department" required>
                                    <option value="">Select Department</option>
                                    <option value="IT">IT</option>
                                    <option value="HR">HR</option>
                                    <option value="Finance">Finance</option>
                                    <option value="Sales">Sales</option>
                                    <option value="Operations">Operations</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="notes" class="form-label">Notes</label>
                                <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="Additional notes..."></textarea>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Assign Device</button>
                                <a href="/assignments" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light py-4 mt-5 border-top">
        <div class="container-fluid text-center">
            <p class="text-muted mb-0"><i class="bi bi-shield-check"></i> IMS v1.0.0</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div th:if="${session.currentUser != null}" style="position: fixed; right: 16px; bottom: 16px; z-index: 1040; display: flex; gap: 8px; align-items: center; background: #ffffff; border: 1px solid #d0dff0; border-radius: 999px; padding: 6px 10px; box-shadow: 0 6px 18px rgba(16,50,84,0.18);">
    <span style="font-size: 12px; color: #4d627c;" th:text="'User: ' + ${session.currentUser.username}">Admin</span>
    <a href="/logout" class="btn btn-sm btn-outline-danger" style="border-radius: 999px;">Logout</a>
</div>
</body>
</html>
