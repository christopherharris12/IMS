<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Return Device</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #0f4c81 0%, #1b7cc9 100%);">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-laptop"></i> IMS</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <h1><i class="bi bi-arrow-return-left"></i> Return Device</h1>
                <div class="card mt-3">
                    <div class="card-body">
                        <form th:action="'/assignments/' + ${assignment.id} + '/return'" method="post">
                            <p><strong>Device:</strong> <span th:text="${assignment.device.assetTag}">ASSET-001</span></p>
                            <p><strong>Employee:</strong> <span th:text="${assignment.employeeName}">John</span></p>
                            
                            <div class="mb-3">
                                <label for="condition" class="form-label">Device Condition <span class="text-danger">*</span></label>
                                <select class="form-select" id="condition" name="condition" required>
                                    <option value="">Select Condition</option>
                                    <option value="NEW">New</option>
                                    <option value="GOOD">Good</option>
                                    <option value="FAIR">Fair</option>
                                    <option value="POOR">Poor</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="notes" class="form-label">Notes</label>
                                <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="Any additional notes..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Confirm Return</button>
                            <a th:href="'/assignments/' + ${assignment.id}" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div th:if="${session.currentUser != null}" style="position: fixed; right: 16px; bottom: 16px; z-index: 1040; display: flex; gap: 8px; align-items: center; background: #ffffff; border: 1px solid #d0dff0; border-radius: 999px; padding: 6px 10px; box-shadow: 0 6px 18px rgba(16,50,84,0.18);">
    <span style="font-size: 12px; color: #4d627c;" th:text="'User: ' + ${session.currentUser.username}">Admin</span>
    <a href="/logout" class="btn btn-sm btn-outline-danger" style="border-radius: 999px;">Logout</a>
</div>
</body>
</html>
