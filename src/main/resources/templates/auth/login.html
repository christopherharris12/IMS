<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - IMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #eef4fc;
            --ink: #12243a;
            --muted: #4f6076;
            --brand: #0f4c81;
            --brand2: #1b7cc9;
            --danger: #dc3545;
        }
        body {
            margin: 0;
            font-family: 'Manrope', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 5%, #dbeafe 0, rgba(219, 234, 254, 0) 32%),
                radial-gradient(circle at 90% 20%, #e0ecff 0, rgba(224, 236, 255, 0) 30%),
                var(--bg);
            display: grid;
            place-items: center;
            padding: 1rem;
        }
        .auth-shell {
            width: 100%;
            max-width: 430px;
            border-radius: 18px;
            background: #fff;
            border: 1px solid #d9e5f3;
            box-shadow: 0 18px 45px rgba(16, 50, 84, 0.18);
            overflow: hidden;
        }
        .auth-head {
            background: linear-gradient(120deg, #0b3558, var(--brand), var(--brand2));
            color: #fff;
            padding: 1.25rem 1.4rem;
        }
        .auth-head h1 {
            margin: 0;
            font-size: 1.25rem;
            font-family: 'Space Grotesk', sans-serif;
        }
        .auth-body {
            padding: 1.3rem 1.4rem 1.4rem;
        }
        .form-label {
            font-weight: 700;
            font-size: 0.92rem;
        }
        .form-control {
            border-radius: 10px;
            border-color: #cfdced;
        }
        .form-control:focus {
            border-color: var(--brand2);
            box-shadow: 0 0 0 0.2rem rgba(27, 124, 201, 0.2);
        }
        .btn-brand {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 0.62rem;
            color: #fff;
            background: linear-gradient(120deg, var(--brand), var(--brand2));
            font-weight: 700;
        }
        .invalid-feedback {
            display: block;
        }
        .helper {
            color: var(--muted);
            font-size: 0.86rem;
        }
    </style>
</head>
<body>
<div class="auth-shell">
    <div class="auth-head">
        <h1>Inventory Admin Login</h1>
    </div>
    <div class="auth-body">
        <div th:if="${registered}" class="alert alert-success py-2">Account created successfully. You can now login.</div>
        <div th:if="${logoutSuccess}" class="alert alert-info py-2">You are logged out.</div>
        <div th:if="${loginError}" class="alert alert-danger py-2" th:text="${loginError}"></div>
        <div class="alert alert-warning py-2 mb-3">
            <strong>Demo Credentials:</strong> Username: 24RP07206 | Password: 24RP02943
        </div>

         <form th:action="@{/login}" method="post" novalidate>
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
              <input id="username" name="username" type="text" class="form-control" placeholder="Enter username"
                  th:value="${loginForm != null ? loginForm.username : ''}"
                  th:classappend="${usernameError != null} ? 'is-invalid' : ''">
              <div class="invalid-feedback" th:if="${usernameError != null}" th:text="${usernameError}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
              <input id="password" name="password" type="password" class="form-control" placeholder="Enter password"
                  th:classappend="${passwordError != null} ? 'is-invalid' : ''">
              <div class="invalid-feedback" th:if="${passwordError != null}" th:text="${passwordError}"></div>
            </div>

            <button type="submit" class="btn-brand">Login</button>
        </form>

        <p class="helper mt-3 mb-1">New user? <a href="/signup">Create an account</a></p>
        <p class="helper mt-2 mb-0">
            Developed by: Name 1 (24RP07206) and Name 2 (24RP02943)
        </p>
    </div>
</div>
</body>
</html>
