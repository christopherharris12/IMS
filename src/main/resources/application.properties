# Server Configuration
spring.application.name=IMS
server.port=${PORT:8080}
server.servlet.context-path=/

# H2 Database Configuration (Offline Support)
spring.datasource.url=jdbc:h2:file:./data/inventorydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML5

# Logging
logging.level.root=INFO
logging.level.com.chriss.demo=DEBUG

# Application Info
app.name=IMS
app.version=1.0.0
app.description=Inventory Management System

app.mail.from=no-reply@inventory.local

